<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Filmbinge – Project Status</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #38bdf8;
      --border: #1f2933;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
      background: #020617;
      color: var(--text);
      line-height: 1.6;
    }
    main {
      max-width: 760px;
      margin: 48px auto;
      padding: 0 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
    }
    h1 { margin-top: 0; }
    p { color: var(--muted); }
    a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>Filmbinge</h1>
      <p>
        Filmbinge is an up-and-coming iOS app project inspired by Letterboxd.
        The app is currently in progress and actively being built.
      </p>
      <p><a href="index.html">Back to portfolio</a></p>
    </div>
  </main>
</body>
</html>
